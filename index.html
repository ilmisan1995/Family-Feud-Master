<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Fortunes Web</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f2a;
  color: white;
}
.container {
  display: flex;
  height: 100vh;
}
.left, .right {
  padding: 15px;
  box-sizing: border-box;
}
.left {
  width: 40%;
  background: #11163a;
  border-right: 3px solid #222;
}
.right {
  width: 60%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
h2 {
  margin-top: 0;
}
input, button {
  padding: 8px;
  margin: 5px 0;
  width: 100%;
  border: none;
  border-radius: 5px;
}
button {
  background: #1e90ff;
  color: white;
  cursor: pointer;
}
button:hover {
  background: #0c6ed6;
}
.answer-list {
  margin-top: 10px;
}
.answer-item {
  display: flex;
  justify-content: space-between;
  background: #1a1f4d;
  padding: 8px;
  margin-bottom: 5px;
  border-radius: 5px;
}
.board {
  background: linear-gradient(#1e2a78, #0a0f3d);
  border-radius: 15px;
  padding: 20px;
}
.row {
  display: flex;
  justify-content: space-between;
  background: #2433a6;
  margin: 8px 0;
  padding: 10px;
  border-radius: 20px;
}
.hidden {
  background: #0a0f3d;
}
.score {
  font-weight: bold;
}
.total {
  text-align: center;
  font-size: 24px;
  margin-top: 10px;
}
</style>
</head>
<body>
<div class="container">
  <div class="left">
    <h2>Control Board</h2>
    <input id="question" placeholder="Masukkan pertanyaan">
    <input id="answer" placeholder="Jawaban">
    <input id="score" type="number" placeholder="Skor">
    <button onclick="addAnswer()">Tambah Jawaban</button>
    <div class="answer-list" id="answerList"></div>
    <button onclick="startGame()">Start Game</button>
  </div>  <div class="right">
    <div class="board">
      <h2 id="gameQuestion">Pertanyaan</h2>
      <div id="board"></div>
      <div class="total">TOTAL: <span id="total">0</span></div>
    </div>
  </div>
</div><script>
let answers = [];
let revealed = [];

function addAnswer() {
  const ans = document.getElementById('answer').value;
  const score = parseInt(document.getElementById('score').value);
  if (!ans || !score) return;

  answers.push({ text: ans, score });
  revealed.push(false);
  renderList();

  document.getElementById('answer').value = '';
  document.getElementById('score').value = '';
}

function renderList() {
  const list = document.getElementById('answerList');
  list.innerHTML = '';
  answers.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'answer-item';
    div.innerHTML = `${a.text} (${a.score}) <button onclick="reveal(${i})">Tampil</button>`;
    list.appendChild(div);
  });
}

function startGame() {
  document.getElementById('gameQuestion').innerText = document.getElementById('question').value;
  renderBoard();
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  answers.forEach((a, i) => {
    const row = document.createElement('div');
    row.className = 'row ' + (revealed[i] ? '' : 'hidden');
    row.onclick = () => reveal(i);

    row.innerHTML = `
      <span>${i + 1}. ${revealed[i] ? a.text : '????'}</span>
      <span class="score">${revealed[i] ? a.score : ''}</span>
    `;

    board.appendChild(row);
  });

  updateTotal();
}

function reveal(index) {
  revealed[index] = true;
  renderBoard();
}

function updateTotal() {
  let total = 0;
  answers.forEach((a, i) => {
    if (revealed[i]) total += a.score;
  });
  document.getElementById('total').innerText = total;
}
</script></body>
</html>
